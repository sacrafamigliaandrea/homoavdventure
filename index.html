<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Viaggio dell'Uomo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--hf:'Cinzel',serif;--bf:'Crimson Pro',serif;--bone:#E8DCC8;--sand:#C4A24E;--earth:#8B6914;--clay:#A0522D;--moss:#6B7F3B;--mossL:#9AAF5C;--stone:#6b5d4a;--char:#1a1510;--deep:#0e0c08;--ice:#5A7D8B;--iceL:#8AABB8;--fire:#D2845A}
body{font-family:var(--bf);color:var(--bone);background:linear-gradient(180deg,var(--deep),var(--char) 50%,var(--deep));min-height:100vh;line-height:1.6;font-size:15px;overflow-x:hidden}
input:focus,textarea:focus{outline:none;border-color:var(--sand)!important}
.hf{font-family:var(--hf)}
#app{max-width:720px;margin:0 auto;padding:20px}

/* Card */
.card{background:linear-gradient(170deg,#2a2218,#1e1a14 60%,#252015);border-radius:12px;padding:24px;position:relative;box-shadow:inset 0 0 30px #00000044,0 4px 12px #00000044;overflow:hidden;margin-bottom:16px;border:1px solid #ffffff08}

/* XP bar */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #ffffff08}
.xpt{flex:1;height:8px;background:#0e0c08;border-radius:4px;overflow:hidden}
.xpf{height:100%;background:linear-gradient(90deg,var(--earth),var(--sand));border-radius:4px;transition:width .8s}

/* Survival hearts */
.hearts{display:flex;gap:4px}
.heart{width:22px;height:22px;transition:all .3s}
.heart.lost{opacity:.2;transform:scale(.8)}

/* Choices */
.choices{display:grid;gap:10px;margin-top:16px}
.choice{padding:14px 16px;border-radius:10px;border:1.5px solid #ffffff10;background:#0e0c0888;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:12px;text-align:left;font-family:var(--bf);font-size:15px;color:var(--bone)}
.choice:hover{border-color:var(--sand);background:#C4A24E0a;transform:translateX(4px)}
.choice .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* Feedback overlay */
.feedback{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .3s}
.feedback-card{background:#1e1a14;border-radius:16px;padding:32px;max-width:440px;width:90%;text-align:center;border:2px solid;box-shadow:0 20px 60px #00000088}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.pop{animation:pop .4s ease-out}
.shake{animation:shake .4s}

/* Scene */
.scene{width:100%;height:180px;border-radius:10px;margin-bottom:16px;overflow:hidden;position:relative}

/* Flash card */
.fc{perspective:800px;cursor:pointer;margin:20px auto;max-width:400px}
.fc-inner{position:relative;height:320px;transition:transform .6s;transform-style:preserve-3d}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fc-back{transform:rotateY(180deg);overflow:auto;justify-content:flex-start!important;align-items:stretch!important}

/* Btn */
.btn{font-family:var(--hf);font-size:12px;padding:12px 28px;letter-spacing:2px;background:transparent;border:1.5px solid var(--sand);color:var(--sand);border-radius:8px;cursor:pointer;transition:all .2s;text-transform:uppercase;display:inline-block}
.btn:hover{background:#C4A24E12}
.btn:disabled{opacity:.3;cursor:default}
.btn.solid{background:var(--sand);color:var(--deep)}
.btn.solid:hover{background:var(--earth)}

/* Progress dots */
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.dot{width:12px;height:12px;border-radius:50%;border:1.5px solid #ffffff15;transition:all .3s}
.dot.done{background:var(--sand);border-color:var(--sand)}
.dot.active{border-color:var(--sand);box-shadow:0 0 8px #C4A24E44}

/* Inventory */
.inv{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.inv-item{background:#0e0c0888;border:1px solid #ffffff10;border-radius:8px;padding:6px 10px;font-size:13px;display:flex;align-items:center;gap:6px;animation:pop .3s}

/* Float XP */
.fxp{position:fixed;color:var(--sand);font-family:var(--hf);font-size:16px;font-weight:700;pointer-events:none;z-index:999;animation:floatUp 1s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.3)}}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}

/* Modern grid */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.mcard{background:#0e0c0888;border:1px solid #ffffff10;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .3s}
.mcard:hover{border-color:var(--sand)}
.mcard.checked{border-color:var(--sand);background:#C4A24E0a}
.mcard .big{font-size:28px;margin-bottom:6px}

/* Quiz */
.qopt{padding:10px 14px;border-radius:8px;border:1.5px solid #ffffff10;background:#0e0c0888;cursor:pointer;transition:all .2s;font-family:var(--bf);font-size:14px;color:var(--bone);text-align:left}
.qopt:hover{border-color:var(--sand)}
.qopt.sel{border-color:var(--sand);background:#C4A24E15}
.qopt.ok{border-color:var(--moss);background:#6B7F3B15;color:var(--mossL)}
.qopt.no{border-color:var(--clay);background:#A0522D15;color:var(--fire)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-box{background:#0e0c0866;border-radius:8px;padding:14px;border-left:3px solid #7B5E3E33;margin-bottom:10px}
.meta-box textarea{width:100%;font-size:14px;font-family:var(--bf);background:transparent;border:1px solid #2a2218;border-radius:6px;color:var(--bone);padding:8px;resize:vertical}
</style>
</head>
<body>
<div id="app"></div>

scenarios:[
  {text:"Hai inventato il linguaggio! Cosa fai con questo superpotere?",choices:[
    {text:"Racconto storie e insegno ai giovani",icon:"📖",correct:true,fb:"Il linguaggio è il nostro superpotere! Grazie alle storie, trasmettiamo conoscenze. Nessun altro animale può farlo così!",item:"Linguaggio complesso"},
    {text:"Lo uso solo per dire 'ciao'",icon:"👋",correct:false,fb:"Troppo poco! Il linguaggio ci permette di trasmettere tutto: storie, istruzioni, sentimenti, idee!"},
    {text:"Non mi serve, preferisco i gesti",icon:"🤷",correct:false,fb:"I gesti funzionano, ma il linguaggio ti permette di spiegare il passato, il futuro, i sogni!"}
  ]},
  {text:"Il tuo gruppo cresce. Come vi organizzate?",choices:[
    {text:"Ognuno pensa per sé",icon:"🧍",correct:false,fb:"Da soli siamo deboli! Il segreto del Sapiens è la cooperazione!"},
    {text:"Ci dividiamo i compiti e cooperiamo",icon:"🤝",correct:true,fb:"QUESTO è il segreto dell'Homo Sapiens! La cooperazione ci ha permesso di costruire villaggi, poi città, poi civiltà intere!",item:"Cooperazione"},
    {text:"Eleggo un re che comanda tutti",icon:"👑",correct:false,fb:"I primi gruppi di Sapiens erano più democratici! La collaborazione veniva prima del comando."}
  ]},
  {text:"Vuoi lasciare un segno del tuo passaggio. Come?",choices:[
    {text:"Dipingo sulle pareti della grotta",icon:"🎨",correct:true,fb:"L'arte rupestre! I Sapiens hanno inventato l'arte: dipinti, sculture, musica. Esprimere sé stessi è ciò che ci rende unici!",item:"Arte rupestre"},
    {text:"Faccio una foto",icon:"📸",correct:false,fb:"La fotografia arriverà molto dopo! Ma l'idea è giusta: voler lasciare un ricordo. I Sapiens lo facevano con l'arte!"},
    {text:"Non mi interessa",icon:"😐",correct:false,fb:"L'Homo Sapiens ha sempre voluto lasciare un segno! L'arte rupestre di 40.000 anni fa è ancora lì, nelle grotte!"}
  ]}
]}
];

const QUIZ=[
{q:"Chi ha usato per primo gli strumenti di pietra?",o:["Australopiteco","Homo Habilis","Homo Erectus"],c:1},
{q:"Chi ha scoperto il fuoco?",o:["Homo Habilis","Homo Erectus","Neanderthal"],c:1},
{q:"Chi seppelliva i morti con i fiori?",o:["Homo Erectus","Neanderthal","Homo Sapiens"],c:1},
{q:"Cosa significa 'bipede'?",o:["Mangiare carne","Camminare su due gambe","Usare il fuoco"],c:1},
{q:"Qual è il superpotere dell'Homo Sapiens?",o:["La forza","Il linguaggio e la cooperazione","La velocità"],c:1}
];

const MODERN=[
{icon:"🍳",text:"Fai colazione dal frigo"},{icon:"👕",text:"Scegli i vestiti dall'armadio"},{icon:"📱",text:"Parli e scrivi con tutti"},{icon:"🏠",text:"Vivi in una casa sicura"},{icon:"🚗",text:"Vai a scuola in auto"},{icon:"💡",text:"Accendi la luce con un click"}
];

/* ═══════ STATE ═══════ */
let G={ph:"intro",nm:"",xp:0,hearts:5,sp:0,sc:0,inv:[],fb:null,modern:[],fcIdx:0,fcFlip:{},qa:{},qDone:false};
const app=document.getElementById('app');

function fx(a,e){
  G.xp+=a;
  if(e){const d=document.createElement('div');d.className='fxp';d.textContent='+'+a+' XP';d.style.left=(e.clientX||200)+'px';d.style.top=(e.clientY||200)+'px';document.body.appendChild(d);setTimeout(()=>d.remove(),1100)}
}

function heartSVG(full){return`<svg class="heart ${full?'':'lost'}" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${full?'#C4A24E':'#3a3228'}"/></svg>`}

function topbar(){
  const pct=Math.min(G.xp/400*100,100);
  return`<div class="topbar">
    <div class="hearts">${Array.from({length:5}).map((_,i)=>heartSVG(i<G.hearts)).join('')}</div>
    <div class="xpt"><div class="xpf" style="width:${pct}%"></div></div>
    <span class="hf" style="font-size:11px;color:var(--sand)">${G.xp} XP</span>
  </div>`;
}

function dots(){
  return`<div class="dots">${SPECIES.map((_,i)=>`<div class="dot ${i<G.sp?'done':''} ${i===G.sp?'active':''}"></div>`).join('')}</div>`;
}

function R(){
  switch(G.ph){
    case'intro':rI();break;
    case'modern':rM();break;
    case'play':rP();break;
    case'fc':rFC();break;
    case'quiz':rQ();break;
    case'end':rE();break;
  }
}

/* ═══════ INTRO ═══════ */
function rI(){
  app.innerHTML=`
  <div style="text-align:center;padding-top:30px">
    <svg width="80" height="80" viewBox="0 0 80 80" style="opacity:.7;margin-bottom:12px"><circle cx="40" cy="40" r="34" fill="none" stroke="var(--sand)" stroke-width="1" stroke-dasharray="3 4"/><path d="M40 16c-7 12-20 18-16 38 3 12 20 16 28 10s9-18 0-34c-2 7-7 11-11 9s-6-10-1-23z" fill="var(--earth)" opacity=".25"/></svg>
    <h1 class="hf" style="font-size:20px;color:var(--sand);letter-spacing:3px;margin-bottom:4px">IL VIAGGIO DELL'UOMO</h1>
    <p class="hf" style="font-size:9px;color:#4a3d2e;letter-spacing:4px;margin-bottom:28px;animation:breathe 3s infinite">UN'AVVENTURA NELLA PREISTORIA</p>
    <div class="card" style="text-align:left;max-width:500px;margin:0 auto 24px">
      <p style="font-size:16px;line-height:1.8;margin-bottom:16px">Stai per viaggiare indietro nel tempo di <strong style="color:var(--sand)">4 milioni di anni</strong>. Dovrai sopravvivere come i nostri antenati: trovare cibo, ripararti, comunicare... senza nulla di quello che hai oggi!</p>
      <p style="font-size:14px;color:var(--stone);margin-bottom:20px">Fai le scelte giuste per sopravvivere. Ogni errore ti costa un cuore!</p>
      <div style="text-align:center">
        <input id="ni" type="text" placeholder="Come ti chiami, esploratore?" style="width:100%;max-width:280px;padding:10px 16px;font-size:16px;font-family:var(--bf);background:transparent;border:1.5px solid #3a3228;border-radius:8px;color:var(--bone);text-align:center;margin-bottom:16px">
        <br><button class="btn solid" onclick="go()">Inizia il viaggio</button>
      </div>
    </div>
  </div>`;
}

function go(){const v=document.getElementById('ni').value.trim();if(!v)return;G.nm=v;G.ph='modern';R()}

/* ═══════ MODERN DAY ═══════ */
function rM(){
  app.innerHTML=`
    ${topbar()}
    <div style="text-align:center;margin-bottom:16px">
      <p class="hf" style="font-size:12px;color:var(--sand);letter-spacing:2px;margin-bottom:8px">PRIMA DI PARTIRE...</p>
      <p style="font-size:16px;color:var(--bone)">Ecco cosa fai ogni giorno <strong style="color:var(--sand)">oggi</strong>. Tocca per confermare:</p>
    </div>
    <div class="mgrid">${MODERN.map((m,i)=>`
      <div class="mcard ${G.modern.includes(i)?'checked':''}" onclick="togM(${i},event)">
        <div class="big">${m.icon}</div>
        <div style="font-size:13px;color:${G.modern.includes(i)?'var(--sand)':'var(--stone)'}">${m.text}</div>
      </div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:16px">
      <p style="font-size:14px;color:var(--stone);margin-bottom:12px">${G.modern.length<4?`Seleziona almeno 4 cose (${G.modern.length}/4)`:'Tutto questo tra poco non esisterà più...'}</p>
      <button class="btn ${G.modern.length>=4?'solid':''}" ${G.modern.length<4?'disabled':''} onclick="G.ph='play';R()">Viaggia nel tempo</button>
    </div>`;
}

function togM(i,e){const idx=G.modern.indexOf(i);if(idx>-1)G.modern.splice(idx,1);else{G.modern.push(i);fx(5,e)}R()}

/* ═══════ PLAY ═══════ */
function rP(){
  if(G.sp>=SPECIES.length){G.ph='fc';G.fcIdx=0;R();return}
  const s=SPECIES[G.sp];
  const sc=s.scenarios[G.sc];
  if(!sc){G.sp++;G.sc=0;R();return}

  app.innerHTML=`
    ${topbar()}${dots()}
    <div class="scene">${s.scene()}</div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
        ${s.icon(36)}
        <div>
          <div class="hf" style="font-size:13px;color:${s.accent};letter-spacing:1px">${s.name}</div>
          <div style="font-size:12px;color:var(--stone)">${s.period}</div>
        </div>
      </div>
      ${G.inv.length?`<div class="inv">${G.inv.map(x=>`<div class="inv-item"><span style="font-size:14px">✦</span> ${x}</div>`).join('')}</div>`:''}
    </div>
    <div class="card">
      <p style="font-size:17px;font-weight:600;margin-bottom:4px;color:var(--bone)">${sc.text}</p>
      <div class="choices">${sc.choices.map((ch,i)=>`
        <div class="choice" onclick="pick(${i},event)">
          <div class="icon" style="background:${s.bg};border:1px solid ${s.accent}33">${ch.icon}</div>
          <div>${ch.text}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function pick(i,ev){
  const s=SPECIES[G.sp];
  const sc=s.scenarios[G.sc];
  const ch=sc.choices[i];
  if(ch.correct){fx(25,ev);if(ch.item&&!G.inv.includes(ch.item))G.inv.push(ch.item)}
  else{G.hearts=Math.max(0,G.hearts-1)}
  showFB(ch,s);
}

function showFB(ch,s){
  const ok=ch.correct;
  const el=document.createElement('div');
  el.className='feedback';
  el.style.background='#0e0c08cc';
  el.innerHTML=`<div class="feedback-card ${ok?'pop':'shake'}" style="border-color:${ok?'var(--moss)':'var(--clay)'}">
    <div style="font-size:48px;margin-bottom:12px">${ok?'✓':'✗'}</div>
    <p style="font-size:16px;line-height:1.7;color:var(--bone);margin-bottom:16px">${ch.fb}</p>
    ${ch.item?`<div style="background:var(--moss);color:var(--deep);display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-family:var(--hf);letter-spacing:1px;margin-bottom:12px">✦ ${ch.item}</div>`:(!ok?`<div style="color:var(--clay);font-size:13px;margin-bottom:12px">-1 ❤️</div>`:'')}
    <br><button class="btn" style="border-color:${ok?'var(--moss)':'var(--clay)'};color:${ok?'var(--mossL)':'var(--fire)'}" onclick="closeFB()">Avanti</button>
  </div>`;
  document.body.appendChild(el);
}

function closeFB(){
  document.querySelector('.feedback')?.remove();
  G.sc++;
  if(G.sc>=SPECIES[G.sp].scenarios.length){G.sp++;G.sc=0}
  R();
}

/* ═══════ FLASHCARDS ═══════ */
function rFC(){
  const s=SPECIES[G.fcIdx];
  const fl=G.fcFlip[G.fcIdx];
  const nav=G.fcIdx<SPECIES.length-1
    ?`<button class="btn" onclick="G.fcIdx++;R()">Prossima</button>`
    :`<button class="btn solid" onclick="G.ph='quiz';R()">Vai al quiz finale!</button>`;

  app.innerHTML=`
    ${topbar()}
    <p class="hf" style="text-align:center;font-size:11px;color:var(--sand);letter-spacing:2px;margin-bottom:16px">SCHEDE — ${G.fcIdx+1}/${SPECIES.length}</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
      ${SPECIES.map((x,i)=>`<div onclick="G.fcIdx=${i};R()" style="width:32px;height:32px;border-radius:50%;border:1.5px solid ${i===G.fcIdx?x.accent:'#2a2218'};background:${i===G.fcIdx?x.bg:'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center">${x.icon(18)}</div>`).join('')}
    </div>
    <div class="fc" onclick="flipFC(event)">
      <div class="fc-inner ${fl?'flipped':''}">
        <div class="fc-face" style="background:linear-gradient(160deg,${s.bg},var(--deep));border:1.5px solid ${s.accent}33">
          <div style="margin-bottom:12px">${s.icon(72)}</div>
          <div class="hf" style="font-size:16px;color:${s.accent};letter-spacing:2px;margin-bottom:4px">${s.name}</div>
          <div style="font-size:13px;color:var(--stone)">${s.period}</div>
          <div class="hf" style="font-size:9px;color:#3a3228;margin-top:20px;animation:breathe 3s infinite;letter-spacing:2px">TOCCA PER GIRARE</div>
        </div>
        <div class="fc-face fc-back" style="background:linear-gradient(160deg,var(--deep),${s.bg});border:1.5px solid ${s.accent}33">
          <div class="hf" style="font-size:13px;color:${s.accent};letter-spacing:1px;margin-bottom:12px;text-align:center">${s.name}</div>
          <div class="g2" style="margin-bottom:12px">
            ${[["Cervello",s.brain],["Altezza",s.height],["Strumenti",s.tool],["Fuoco",s.fire?"Si":"No"],["Linguaggio",s.lang?"Si":"No"],["Habitat",s.id==='sapiens'?'Tutto il mondo':s.id==='neander'?'Europa glaciale':s.id==='erectus'?'Africa, Asia, Europa':'Africa']].map(([l,v])=>`<div class="sb" style="border-left:2px solid ${s.accent}22"><div class="hf" style="font-size:8px;color:var(--stone);letter-spacing:1px">${l}</div><div style="font-size:13px">${v}</div></div>`).join('')}
          </div>
          <div class="hf" style="font-size:9px;color:${s.accent};letter-spacing:1px;margin-bottom:6px">CURIOSITÀ</div>
          ${s.facts.map(f=>`<p style="color:#8a7b66;font-size:12px;margin-bottom:4px;line-height:1.4;padding-left:8px;border-left:1px solid ${s.accent}18">${f}</p>`).join('')}
        </div>
      </div>
    </div>
    <div style="text-align:center">${nav}</div>`;
}

function flipFC(e){if(!G.fcFlip[G.fcIdx]){G.fcFlip[G.fcIdx]=true;fx(10,e);R()}}

/* ═══════ QUIZ ═══════ */
function rQ(){
  if(G.qDone){rE();return}
  app.innerHTML=`
    ${topbar()}
    <p class="hf" style="text-align:center;font-size:12px;color:var(--sand);letter-spacing:2px;margin-bottom:20px">QUIZ FINALE</p>
    ${QUIZ.map((q,i)=>`<div class="card">
      <p style="font-size:15px;margin-bottom:10px"><span class="hf" style="font-size:10px;color:var(--sand);margin-right:6px">${i+1}.</span>${q.q}</p>
      <div style="display:grid;gap:6px">${q.o.map((o,j)=>`<button class="qopt ${G.qa[i]===j?'sel':''}" onclick="G.qa[${i}]=${j};R()">${o}</button>`).join('')}</div>
    </div>`).join('')}
    <div style="text-align:center;margin-top:16px">
      <button class="btn ${Object.keys(G.qa).length===QUIZ.length?'solid':''}" ${Object.keys(G.qa).length<QUIZ.length?'disabled':''} onclick="subQ(event)">Scopri i risultati</button>
      ${Object.keys(G.qa).length<QUIZ.length?`<p style="font-size:12px;color:var(--stone);margin-top:8px">${Object.keys(G.qa).length}/${QUIZ.length}</p>`:''}
    </div>`;
}

function subQ(ev){
  G.qDone=true;
  const sc=QUIZ.reduce((a,q,i)=>a+(G.qa[i]===q.c?1:0),0);
  G.qs=sc;
  fx(sc*30,ev);
  G.ph='end';R();
}

/* ═══════ END ═══════ */
function rE(){
  const sc=G.qs||0;
  const tot=G.xp;

  // Show quiz answers
  const review=QUIZ.map((q,i)=>{
    const ok=G.qa[i]===q.c;
    return`<div style="display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #ffffff06">
      <span style="font-size:18px">${ok?'✓':'✗'}</span>
      <div><span style="font-size:13px;color:${ok?'var(--mossL)':'var(--fire)'}">${q.q}</span>
      ${!ok?`<div style="font-size:12px;color:var(--stone);margin-top:2px">→ ${q.o[q.c]}</div>`:''}</div>
    </div>`;
  }).join('');

  const badge=sc>=4?'SAPIENTE':sc>=3?'ESPLORATORE':'APPRENDISTA';
  const bc=sc>=4?'var(--moss)':'var(--clay)';

  const metaQs=["Qual è la cosa che ti ha sorpreso di più?","Quale specie ti piacerebbe incontrare? Perché?","Qual è stata la scoperta più importante per l'uomo?","Cosa diresti a un Australopiteco se potessi parlargli?"];

  app.innerHTML=`
    ${topbar()}
    <div class="card" style="text-align:center">
      <svg width="56" height="56" viewBox="0 0 56 56" style="margin-bottom:10px"><circle cx="28" cy="28" r="24" fill="none" stroke="var(--sand)" stroke-width="1.5"/>${sc>=4?'<path d="M28 10l4 11h11l-9 7 3 11-9-7-9 7 3-11-9-7h11z" fill="var(--sand)" opacity=".35"/>':''}</svg>
      <div class="hf" style="font-size:18px;color:var(--sand);letter-spacing:2px;margin-bottom:4px">VIAGGIO COMPLETATO!</div>
      <div class="hf" style="font-size:10px;padding:4px 16px;border-radius:20px;display:inline-block;background:${bc}22;color:${bc};border:1px solid ${bc}33;letter-spacing:1px;margin:8px 0">${badge} DELL'EVOLUZIONE</div>
      <div style="margin-top:12px;font-size:14px;color:var(--stone)">Quiz: ${sc}/${QUIZ.length} · Cuori: ${G.hearts}/5 · Oggetti: ${G.inv.length}</div>
    </div>

    <div class="card">
      <div class="hf" style="font-size:10px;color:var(--sand);letter-spacing:1px;margin-bottom:8px">RISPOSTE QUIZ</div>
      ${review}
    </div>

    ${G.inv.length?`<div class="card">
      <div class="hf" style="font-size:10px;color:var(--sand);letter-spacing:1px;margin-bottom:8px">I TUOI OGGETTI RACCOLTI</div>
      <div class="inv">${G.inv.map(x=>`<div class="inv-item"><span style="color:var(--sand)">✦</span> ${x}</div>`).join('')}</div>
    </div>`:''}

    <div class="card" style="border-top:3px solid #7B5E3E33">
      <div class="hf" style="font-size:11px;color:#BFA57A;letter-spacing:2px;margin-bottom:14px">RIFLESSIONE FINALE</div>
      <p style="font-size:14px;color:var(--stone);margin-bottom:14px">Ripensa al viaggio. Dall'Australopiteco a te: milioni di anni di scoperte, fatiche e conquiste.</p>
      ${metaQs.map(q=>`<div class="meta-box"><p style="color:#BFA57A;font-size:13px;margin-bottom:6px;font-weight:600">${q}</p><textarea rows="2" placeholder="Scrivi qui..."></textarea></div>`).join('')}
      <div style="text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid #ffffff08">
        <div class="hf" style="font-size:16px;color:var(--sand);letter-spacing:2px">${tot} XP TOTALI</div>
        <div style="font-size:13px;color:var(--stone);margin-top:4px">${G.nm} — ${badge} dell'Evoluzione</div>
      </div>
    </div>`;
}

R();
</script>
</body>
</html>

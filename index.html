<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Viaggio dell'Uomo — Diario dell'Esploratore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --hf:'Cormorant Garamond',serif;
  --bf:'Atkinson Hyperlegible',sans-serif;
  --ink:#2D2114;
  --inkL:#5A4A34;
  --inkLL:#887560;
  --parch:#F5EBD4;
  --parchD:#E8D9B5;
  --parchDD:#D4C094;
  --cream:#FBF5E4;
  --ocra:#B8722E;
  --ocraD:#8F5520;
  --sand:#C19A56;
  --earth:#8B6914;
  --moss:#6B8142;
  --mossL:#8BA25F;
  --slate:#5A6A72;
  --slateL:#8FA0A9;
  --bone:#F0E6D0;
}
html{scroll-behavior:smooth}
body{font-family:var(--bf);color:var(--ink);background:var(--cream);min-height:100vh;line-height:1.55;font-size:16px;overflow-x:hidden;background-image:radial-gradient(circle at 20% 10%,#C19A5612 0,transparent 40%),radial-gradient(circle at 80% 90%,#8B691410 0,transparent 40%)}
.hf{font-family:var(--hf);font-weight:600;letter-spacing:.02em}
input,textarea,button{font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:var(--ocra)!important;box-shadow:0 0 0 2px #B8722E22}

#app{max-width:760px;margin:0 auto;padding:20px 18px 60px}

/* ═══ CARDS ═══ */
.card{background:var(--parch);border-radius:10px;padding:22px;margin-bottom:14px;border:1px solid var(--parchDD);box-shadow:0 1px 3px #2D211410,0 4px 16px #2D211408;position:relative}
.card.deep{background:linear-gradient(180deg,var(--parch) 0%,var(--parchD) 100%)}
.card.bone{background:var(--bone);border-color:#E0D4B8}

/* ═══ TOP BAR ═══ */
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding:10px 14px;background:var(--parch);border-radius:8px;border:1px solid var(--parchDD)}
.tb-label{font-family:var(--hf);font-size:12px;letter-spacing:2px;color:var(--inkLL);text-transform:uppercase;flex-shrink:0}
.tb-progress{flex:1;height:4px;background:var(--parchDD);border-radius:2px;overflow:hidden}
.tb-fill{height:100%;background:linear-gradient(90deg,var(--ocra),var(--sand));border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.tb-meta{font-family:var(--hf);font-size:13px;color:var(--inkL);flex-shrink:0}

/* ═══ BUTTONS ═══ */
.btn{font-family:var(--hf);font-size:14px;font-weight:600;padding:12px 28px;letter-spacing:1.5px;background:transparent;border:1.5px solid var(--ocra);color:var(--ocraD);border-radius:6px;cursor:pointer;transition:all .2s;text-transform:uppercase;display:inline-block;text-decoration:none}
.btn:hover:not(:disabled){background:var(--ocra);color:#fff;transform:translateY(-1px);box-shadow:0 4px 12px #B8722E33}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.solid{background:var(--ocra);color:#fff}
.btn.solid:hover:not(:disabled){background:var(--ocraD)}
.btn.ghost{border-color:var(--inkLL);color:var(--inkL)}
.btn.ghost:hover:not(:disabled){background:var(--inkL);color:#fff}
.btn.sm{font-size:11px;padding:8px 18px;letter-spacing:1px}

/* ═══ CHOICE BUTTONS ═══ */
.choices{display:grid;gap:10px;margin-top:14px}
.choice{padding:14px 16px;border-radius:8px;border:1.5px solid var(--parchDD);background:var(--cream);cursor:pointer;transition:all .2s;text-align:left;font-size:15px;color:var(--ink);line-height:1.45;font-family:inherit;width:100%;display:flex;align-items:center;gap:12px}
.choice:hover{border-color:var(--ocra);background:#B8722E08;transform:translateX(3px)}
.choice.selected{border-color:var(--ocra);background:#B8722E15}
.choice-mark{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--parchDD);display:flex;align-items:center;justify-content:center;background:var(--parch);font-family:var(--hf);font-size:12px;color:var(--inkLL);transition:all .2s}
.choice:hover .choice-mark,.choice.selected .choice-mark{border-color:var(--ocra);color:var(--ocra)}

/* ═══ SCENE ═══ */
.scene{width:100%;height:230px;border-radius:10px;margin-bottom:14px;overflow:hidden;position:relative;border:1px solid var(--parchDD);background:#EAD9B5}
.scene svg{display:block;width:100%;height:100%}
.hotspot{position:absolute;cursor:pointer;transition:all .3s;filter:drop-shadow(0 0 0 transparent)}
.hotspot:hover{filter:drop-shadow(0 0 8px #FFFFFF99)}
.hotspot.found{opacity:.35;cursor:default}
.hotspot .pulse{animation:pulse 2.2s ease-in-out infinite;transform-origin:center}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.15);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ═══ DOTS / STEPPER ═══ */
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.step{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--parchDD);background:transparent;transition:all .3s}
.step.done{background:var(--ocra);border-color:var(--ocra)}
.step.active{border-color:var(--ocra);box-shadow:0 0 0 3px #B8722E22}

/* ═══ INVENTORY ═══ */
.tools{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;background:var(--cream);border-radius:6px;border:1px dashed var(--parchDD);margin-bottom:14px}
.tools-label{font-family:var(--hf);font-size:11px;letter-spacing:2px;color:var(--inkLL);text-transform:uppercase;width:100%;margin-bottom:4px}
.tool-item{background:var(--parch);border:1px solid var(--parchDD);border-radius:20px;padding:4px 10px 4px 6px;font-size:12px;display:flex;align-items:center;gap:6px;animation:fadeIn .4s}
.tool-item svg{flex-shrink:0}

/* ═══ DIARY ═══ */
.diary-page{background:var(--bone);padding:26px;border-radius:8px;border:1px solid #E0D4B8;position:relative;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,#D4C8A825 27px,#D4C8A825 28px)}
.diary-page::before{content:'';position:absolute;left:42px;top:10px;bottom:10px;width:1px;background:#C49A6815}
.diary-title{font-family:var(--hf);font-style:italic;font-size:20px;color:var(--ocraD);margin-bottom:14px;padding-left:14px;border-left:2px solid var(--ocra)}
.diary-label{font-family:var(--hf);font-size:12px;letter-spacing:1.5px;color:var(--inkLL);text-transform:uppercase;margin:14px 0 6px}
.diary-input{width:100%;padding:10px 12px;background:transparent;border:none;border-bottom:1.5px dotted var(--inkLL);font-family:var(--bf);font-size:15px;color:var(--ink);resize:vertical;font-style:italic;line-height:1.8}
.diary-input:focus{border-bottom-color:var(--ocra);background:#FFFFFF44}
.diary-input::placeholder{color:var(--inkLL);font-style:italic;opacity:.6}
.diary-saved-hint{font-size:11px;color:var(--mossL);font-style:italic;text-align:right;margin-top:4px;opacity:0;transition:opacity .3s}
.diary-saved-hint.show{opacity:1}

/* ═══ TIMELINE ═══ */
.tl-slot{min-height:86px;border:1.5px dashed var(--parchDD);border-radius:8px;padding:10px;display:flex;align-items:center;justify-content:center;background:var(--cream);transition:all .2s;position:relative}
.tl-slot.over{border-color:var(--ocra);background:#B8722E10}
.tl-slot.correct{border-style:solid;border-color:var(--moss);background:#6B814215}
.tl-slot.wrong{border-style:solid;border-color:var(--ocraD);background:#B8722E15}
.tl-period{position:absolute;top:-9px;left:10px;background:var(--cream);padding:0 6px;font-family:var(--hf);font-size:11px;color:var(--inkLL);letter-spacing:1px}
.tl-pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;padding:14px;background:var(--parch);border-radius:8px;border:1px solid var(--parchDD);min-height:90px}
.tl-card{background:var(--cream);border:1.5px solid var(--parchDD);border-radius:8px;padding:8px 12px;cursor:grab;display:flex;align-items:center;gap:8px;font-size:13px;user-select:none;transition:transform .15s,box-shadow .15s;touch-action:none}
.tl-card:hover{border-color:var(--ocra);transform:translateY(-2px);box-shadow:0 4px 10px #B8722E22}
.tl-card.dragging{opacity:.5;cursor:grabbing}

/* ═══ MATCHING ═══ */
.match-row{display:grid;grid-template-columns:1fr 60px 1fr;gap:10px;align-items:center;margin-bottom:10px}
.match-card{padding:12px 14px;background:var(--parch);border:1.5px solid var(--parchDD);border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;font-size:14px}
.match-card:hover{border-color:var(--ocra)}
.match-card.selected{border-color:var(--ocra);background:#B8722E15}
.match-card.matched{border-color:var(--moss);background:#6B814215;cursor:default;opacity:.75}
.match-line{height:2px;background:var(--parchDD);position:relative}
.match-line.done{background:var(--moss)}

/* ═══ MINI-GAMES ═══ */
.mg-stage{background:var(--parch);border-radius:10px;padding:16px;border:1px solid var(--parchDD);min-height:280px;position:relative;overflow:hidden}
.mg-hint{font-family:var(--hf);font-size:12px;letter-spacing:1px;color:var(--inkLL);text-transform:uppercase;text-align:center;padding:8px;background:var(--cream);border-radius:6px;margin-bottom:10px}

/* ═══ FEEDBACK OVERLAY ═══ */
.overlay{position:fixed;inset:0;background:#2D211488;display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .25s;padding:20px}
.overlay-card{background:var(--parch);border-radius:12px;padding:28px;max-width:440px;width:100%;text-align:center;border:2px solid var(--ocra);box-shadow:0 20px 60px #2D211466}

/* ═══ FLOAT ANIMATIONS ═══ */
.float-xp{position:fixed;color:var(--earth);font-family:var(--hf);font-size:18px;font-weight:700;pointer-events:none;z-index:999;animation:floatUp 1.2s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.2)}}

/* ═══ LEVEL TOGGLE ═══ */
.level-toggle{display:flex;gap:8px;justify-content:center;margin:16px 0}
.level-btn{flex:1;padding:14px;background:var(--parch);border:1.5px solid var(--parchDD);border-radius:8px;cursor:pointer;text-align:center;transition:all .2s;max-width:180px}
.level-btn:hover{border-color:var(--ocra)}
.level-btn.active{border-color:var(--ocra);background:#B8722E15}
.level-btn .hf{font-size:16px;color:var(--ocraD);display:block;margin-bottom:2px}
.level-btn small{font-size:12px;color:var(--inkL)}

/* ═══ MODERN DAY GRID ═══ */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
.mcard{background:var(--parch);border:1.5px solid var(--parchDD);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:8px}
.mcard:hover{border-color:var(--ocra);transform:translateY(-2px)}
.mcard.checked{border-color:var(--ocra);background:#B8722E12;box-shadow:0 3px 10px #B8722E22}
.mcard .mcard-icon{width:44px;height:44px}

/* ═══ HEADINGS ═══ */
h1.big{font-family:var(--hf);font-size:42px;font-weight:600;letter-spacing:.04em;color:var(--ocraD);line-height:1.1;margin-bottom:8px}
h2.mid{font-family:var(--hf);font-size:26px;font-weight:600;color:var(--ocraD);line-height:1.2;margin-bottom:10px}
.subtitle{font-family:var(--hf);font-style:italic;color:var(--inkL);font-size:16px;margin-bottom:6px}
.eyebrow{font-family:var(--hf);font-size:11px;letter-spacing:3px;color:var(--inkLL);text-transform:uppercase;margin-bottom:10px}

/* ═══ SPECIES HEADER ═══ */
.sp-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--parchDD)}
.sp-header .hf{font-size:22px}

/* ═══ PAINT CANVAS ═══ */
.paint-wrap{position:relative;border-radius:8px;overflow:hidden;border:2px solid var(--parchDD);background:#3B2A1A;touch-action:none}
.paint-wrap canvas{display:block;width:100%;cursor:crosshair}
.paint-toolbar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.paint-swatch{width:32px;height:32px;border-radius:50%;border:2px solid var(--parchDD);cursor:pointer;transition:transform .15s}
.paint-swatch.active{border-color:var(--ocra);transform:scale(1.1)}

/* ═══ QUIZ/INPUT ═══ */
.text-input{width:100%;padding:12px 14px;font-size:16px;font-family:var(--bf);background:var(--parch);border:1.5px solid var(--parchDD);border-radius:8px;color:var(--ink)}

/* ═══ HELPERS ═══ */
.text-center{text-align:center}
.mt-16{margin-top:16px}
.mt-20{margin-top:20px}
.mb-12{margin-bottom:12px}
.mb-20{margin-bottom:20px}
.prose p{margin-bottom:10px;font-size:15.5px;line-height:1.65;color:var(--ink)}
.prose p strong{color:var(--ocraD)}
.small-note{font-size:13px;color:var(--inkL);font-style:italic}
.tag{display:inline-block;font-family:var(--hf);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:12px;background:var(--ocra);color:#fff}
.tag.ghost{background:transparent;color:var(--ocraD);border:1px solid var(--ocraD)}
.tag.moss{background:var(--moss)}

/* ═══ PRINT STYLES ═══ */
@media print{
  body{background:#fff;color:#000;font-size:12pt}
  #app{max-width:none;padding:0;margin:0}
  .no-print{display:none!important}
  .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;background:#fff}
  .diary-page{background:#fafafa;page-break-inside:avoid;page-break-after:always}
  .diary-page:last-child{page-break-after:auto}
  .diary-input{border-bottom:1px solid #888;color:#000}
  .topbar,.overlay,.float-xp{display:none}
  h1.big{font-size:22pt;color:#000}
  h2.mid{font-size:16pt;color:#000}
  .tag{background:#444!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ═══ RESPONSIVE ═══ */
@media (max-width:500px){
  #app{padding:14px 12px}
  h1.big{font-size:32px}
  h2.mid{font-size:22px}
  .card{padding:18px}
  .scene{height:180px}
  .match-row{grid-template-columns:1fr 40px 1fr}
  .mgrid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════════════════════
   IL VIAGGIO DELL'UOMO — Diario dell'Esploratore
   Versione costruttivista: Esplora → Ipotizza → Scopri → Agisci
   ═══════════════════════════════════════════════════════════════ */

/* ─────────── SVG LIBRARY (nessun emoji) ─────────── */
const SVG = {
  // Strumenti / oggetti
  footprint:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}"><ellipse cx="12" cy="8" rx="4" ry="5"/><circle cx="7" cy="14" r="1.5"/><circle cx="10" cy="16" r="1.3"/><circle cx="13" cy="17" r="1.3"/><circle cx="16" cy="15" r="1.5"/><ellipse cx="12" cy="20" rx="2.5" ry="1.5"/></svg>`,
  bone:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><path d="M5 7c-1.5 0-2.5 1-2.5 2.5S3.5 12 5 12l6-3 6 3c1.5 0 2.5-1 2.5-2.5S18.5 7 17 7c-.3-1.3-1.3-2-2.5-2s-2 .7-2.5 2c-.5-1.3-1.3-2-2.5-2S7.3 5.7 7 7H5z"/><path d="M5 12l2 5c.3 1.3 1.3 2 2.5 2s2-.7 2.5-2c.5 1.3 1.3 2 2.5 2s2-.7 2.5-2l2-5"/></svg>`,
  leaf:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}"><path d="M17 3C10 3 5 8 5 15c0 2 .5 4 1.5 6C11 20 17 15 17 9V3z" opacity=".8"/><path d="M6 20L18 4" stroke="${c}" stroke-width="1" fill="none"/></svg>`,
  stone:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round"><path d="M4 14l3-8 6-2 7 4 1 7-5 6-8 1z"/><path d="M7 10l4 2 3-3" opacity=".5"/></svg>`,
  spark:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}"><path d="M12 2l2 6 6 2-6 2-2 6-2-6-6-2 6-2z"/></svg>`,
  fire:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}"><path d="M12 2c-1 4-5 6-5 12 0 4 2 7 5 7s5-3 5-7c0-3-2-5-3-8 0 2-1 3-2 3z"/></svg>`,
  needle:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><path d="M3 21L18 6"/><circle cx="19" cy="5" r="2.5"/><circle cx="19" cy="5" r="1" fill="${c}"/></svg>`,
  flower:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}"><circle cx="12" cy="12" r="2.5"/><ellipse cx="12" cy="6" rx="2.5" ry="3.5" opacity=".7"/><ellipse cx="12" cy="18" rx="2.5" ry="3.5" opacity=".7"/><ellipse cx="6" cy="12" rx="3.5" ry="2.5" opacity=".7"/><ellipse cx="18" cy="12" rx="3.5" ry="2.5" opacity=".7"/></svg>`,
  herb:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><path d="M12 22V10"/><path d="M12 10c-3-1-5-4-4-8 4 0 6 3 4 8z"/><path d="M12 14c3-1 6-3 6-7-4-1-7 2-6 7z"/><path d="M12 18c-2-1-4-2-4-5 3 0 5 1 4 5z"/></svg>`,
  hand:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round"><path d="M7 14V8c0-1 .5-1.5 1.5-1.5S10 7 10 8v4V6c0-1 .5-1.5 1.5-1.5S13 5 13 6v6V5c0-1 .5-1.5 1.5-1.5S16 4 16 5v7V8c0-1 .5-1.5 1.5-1.5S19 7 19 8v7c0 4-3 7-7 7s-7-3-7-7c0-1 .5-2 2-2z"/></svg>`,
  mouth:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><path d="M4 12c2-3 5-4 8-4s6 1 8 4c-2 3-5 4-8 4s-6-1-8-4z"/><path d="M8 12c1 0 2 0 4 0s3 0 4 0" opacity=".5"/><path d="M14 8c1-2 3-3 5-2" opacity=".4"/><path d="M14 16c1 2 3 3 5 2" opacity=".4"/></svg>`,
  brush:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><path d="M3 21l7-7"/><path d="M10 14l5-5 5 1-1 5-5 5z" fill="${c}" opacity=".3"/><path d="M15 9l-5-5"/></svg>`,
  cave:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}"><path d="M2 20c0-8 4-14 10-14s10 6 10 14H15c0-4-1-7-3-7s-3 3-3 7H2z"/></svg>`,
  tree:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${c}"><path d="M12 2C8 5 6 8 7 12c-2 0-3 1-3 3s2 3 4 3h8c2 0 4-1 4-3s-1-3-3-3c1-4-1-7-5-10z"/><rect x="11" y="18" width="2" height="4"/></svg>`,
  // UI
  compass:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 6l2 5-2 5-2-5z" fill="${c}"/></svg>`,
  book:(s=24,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><path d="M4 4h7v16H4zM13 4h7v16h-7z"/><path d="M7 8h4M7 12h4M15 8h3M15 12h3"/></svg>`,

/* ─────────── STATE ─────────── */
const LS_KEY = 'viaggiouomo_v2';
const EMPTY_STATE = ()=>({
  phase:'intro',          // intro | setup | modern | species | timeline | matching | export
  name:'',
  level:'primaria',       // primaria | secondaria
  modern:[],              // indici MODERN selezionati
  spIdx:0,                // indice specie corrente
  spStep:'esplora',       // esplora | ipotesi | scopri | agisci | diario
  found:{},               // { spIdx: [hotspotIdx, ...] }
  hyp:{},                 // { spIdx: optionIdx }
  tools:[],               // chiavi strumenti raccolti
  mg:{},                  // stati dei mini-game per specie
  diary:{},               // { spIdx: {q1,q2,q3} }
  timelineDone:false,
  matchingDone:false,
  painting:null           // dataURL della pittura rupestre
});

let G = loadState();
const app = document.getElementById('app');

function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return EMPTY_STATE();
    return {...EMPTY_STATE(), ...JSON.parse(raw)};
  }catch(e){ return EMPTY_STATE(); }
}

function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(G)); }catch(e){}
}

function resetAll(){
  if(!confirm('Vuoi davvero ricominciare il viaggio da capo? Perderai il diario attuale.')) return;
  localStorage.removeItem(LS_KEY);
  G = EMPTY_STATE();
  R();
}

/* ─────────── UTILITIES ─────────── */
function floatPlus(text,e){
  if(!e) return;
  const d = document.createElement('div');
  d.className = 'float-xp';
  d.textContent = text;
  d.style.left = (e.clientX||200)+'px';
  d.style.top = (e.clientY||200)+'px';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1300);
}

function txt(primary, secondary){
  return G.level==='secondaria' && secondary ? secondary : primary;
}

function bold(s){
  // Converte **parola** in <strong>
  return String(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}

function progressPct(){
  // Calcolo progressione complessiva
  const total = 5 /*specie*/ * 4 /*step per specie*/ + 3 /*modern + timeline + matching*/;
  let done = 0;
  if(G.modern.length>=4) done++;
  const stepOrder = ['esplora','ipotesi','scopri','agisci','diario'];
  for(let i=0;i<G.spIdx;i++) done += 4;
  if(G.phase==='species'){
    const stepIdx = stepOrder.indexOf(G.spStep);
    if(stepIdx>=0) done += Math.min(stepIdx, 4);
  } else if(G.phase==='timeline' || G.phase==='matching' || G.phase==='export'){
    done += 20;
  }
  if(G.timelineDone) done++;
  if(G.matchingDone) done++;
  return Math.min(100, Math.round(done/total*100));
}

function topbar(){
  return `<div class="topbar no-print">
    <span class="tb-label">${txt('Viaggio','Percorso')}</span>
    <div class="tb-progress"><div class="tb-fill" style="width:${progressPct()}%"></div></div>
    <span class="tb-meta">${G.name || 'Esploratore'}</span>
    <button class="btn sm ghost" onclick="resetAll()" title="Ricomincia">${SVG.compass(14)}</button>
  </div>`;
}

function toolbar(){
  if(!G.tools.length) return '';
  return `<div class="tools">
    <div class="tools-label">Strumenti del Viaggiatore</div>
    ${G.tools.map(t=>{
      const species = SPECIES.find(s=>s.tool.key===t);
      const tool = species?species.tool:null;
      const iconKey = tool?tool.key:'star';
      const iconFn = SVG[iconKey] || SVG.star;
      const color = species?species.color:'var(--ocra)';
      return `<div class="tool-item" title="${tool?tool.desc:''}">${iconFn(18,color)} ${tool?tool.name:t}</div>`;
    }).join('')}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   ROUTER
   ═══════════════════════════════════════════════════════════════ */
function R(){
  saveState();
  window.scrollTo(0,0);
  switch(G.phase){
    case 'intro': rIntro(); break;
    case 'setup': rSetup(); break;
    case 'modern': rModern(); break;
    case 'species': rSpecies(); break;
    case 'timeline': rTimeline(); break;
    case 'matching': rMatching(); break;
    case 'export': rExport(); break;
    default: rIntro();
  }
}

    G.phase = 'timeline';
    R();
    return;

  switch(G.spStep){

    case 'ipotesi': rIpotesi(); break;
    case 'scopri': rScopri(); break;
    case 'agisci': rAgisci(); break;
    case 'diario': rDiarioSpecie(); break;
    default: G.spStep='esplora'; rEsplora();

function findHotspot(i, ev){
  const sp = SPECIES[G.spIdx];
  if(!G.found[G.spIdx]) G.found[G.spIdx] = [];
  if(G.found[G.spIdx].includes(i)) return;
  G.found[G.spIdx].push(i);
  floatPlus('Indizio!', ev);
  const h = sp.hotspots[i];
  showHotspotModal(h, sp);
}

function showHotspotModal(h, sp){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="overlay-card" style="border-color:${sp.color}">
      <div style="width:64px;height:64px;margin:0 auto 14px;border-radius:50%;background:${sp.color}22;display:flex;align-items:center;justify-content:center;color:${sp.color}">

      <div class="hf" style="font-size:18px;color:${sp.color};margin-bottom:10px">${h.label}</div>
      <p style="font-size:15px;line-height:1.6;color:var(--inkL);margin-bottom:18px">${bold(txt(h.reveal.p, h.reveal.pS))}</p>
      <button class="btn solid" onclick="this.closest('.overlay').remove();R()">Continua</button>
    </div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov){ ov.remove(); R(); } });
  document.body.appendChild(ov);
}

/* ─── CLIMB: clicca i rami in ordine dal basso, evita i marci ─── */
function mgClimb(stage){
  // Rami: [y%, solido]
  const branches = [
    {y:85, solid:true,  label:'Radice'},
    {y:70, solid:false, label:'Ramo marcio'},
    {y:72, solid:true,  label:'Ramo solido'},
    {y:55, solid:true,  label:'Ramo solido'},
    {y:40, solid:false, label:'Ramo marcio'},
    {y:42, solid:true,  label:'Ramo solido'},
    {y:25, solid:true,  label:'Vetta'}
  ];
  // Distribuzione orizzontale alternata
  branches.forEach((b,i)=>b.x = 20 + (i%2===0 ? 10 : 60) + (i*4));

  if(!G.mg.climb) G.mg.climb = {pos:-1, fails:0, solidIdx:branches.map((b,i)=>b.solid?i:null).filter(x=>x!==null)};
  const mg = G.mg.climb;

  const targetSolidOrder = mg.solidIdx;
  const nextTarget = targetSolidOrder[mg.pos+1];

  stage.innerHTML = `
    <div style="position:relative;height:320px;background:linear-gradient(180deg,#D4A36A 0,#8B6420 100%);border-radius:8px;overflow:hidden">
      <!-- Palma -->
      <rect x="48%" y="0" style="width:4%;height:100%;background:#5A3D1F;position:absolute;left:48%;top:0;"></rect>
      <div style="position:absolute;left:48%;top:0;width:4%;height:100%;background:#5A3D1F"></div>
      <!-- Foglie cima -->
      <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:80px">
        <svg viewBox="0 0 200 80" style="width:100%;height:100%"><path d="M100 80c-20-20-50-50-90-50 30 0 60 10 70 30M100 80c20-20 50-50 90-50-30 0-60 10-70 30M100 80c-10-30-30-60-50-70 10 20 30 40 40 70M100 80c10-30 30-60 50-70-10 20-30 40-40 70" fill="#3B5020"/></svg>
      </div>
      ${branches.map((b,i)=>{
        const climbed = i<=mg.pos && mg.solidIdx.includes(i);
        const isNext = i===nextTarget;
        const bgColor = climbed ? '#6B8142' : (b.solid ? 'transparent' : 'transparent');
        return `<div onclick="climbBranch(${i})" style="position:absolute;top:${b.y}%;left:${b.x}%;transform:translateY(-50%);cursor:pointer;z-index:5">
          <svg width="80" height="24" viewBox="0 0 80 24">
            <path d="M5 12 Q 40 ${b.solid?8:18} 75 12" stroke="${b.solid?'#5A3D1F':'#8B4500'}" stroke-width="6" fill="none" stroke-linecap="round"/>
            ${climbed?`<circle cx="40" cy="12" r="6" fill="#6B8142"/>`:''}
            ${isNext?`<circle cx="40" cy="12" r="10" fill="none" stroke="#B8722E" stroke-width="2"><animate attributeName="r" values="8;14;8" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;.3;1" dur="1.5s" repeatCount="indefinite"/></circle>`:''}
            ${!b.solid?`<path d="M30 10 L40 14 M35 8 L45 14" stroke="#3A2010" stroke-width="1.5" opacity=".6"/>`:''}
          </svg>
        </div>`;
      }).join('')}
      <!-- Esploratore -->
      ${mg.pos>=0?(()=>{
        const solidIdx = mg.solidIdx[mg.pos];
        const b = branches[solidIdx];
        return `<div style="position:absolute;top:${b.y-5}%;left:${b.x+2}%;transform:translate(-50%,-100%);transition:all .5s">${SVG.sp_australo(36,'#3B2010')}</div>`;
      })():''}
      ${mg.pos<0?`<div style="position:absolute;bottom:4%;left:10%">${SVG.sp_australo(40,'#3B2010')}</div>`:''}
    </div>
    <div style="margin-top:10px;font-size:13px;color:var(--inkL);text-align:center">
      ${mg.pos<0?'Parti dal basso: tocca il ramo successivo.':`Posizione: ${mg.pos+1}/${mg.solidIdx.length} ${mg.fails?`· Scivolate: ${mg.fails}`:''}`}
    </div>`;
  
  if(mg.pos === mg.solidIdx.length-1){
    setTimeout(()=>completeAgisci(), 400);
  }
}

function climbBranch(i){
  const mg = G.mg.climb;
  const expected = mg.solidIdx[mg.pos+1];
  if(i===expected){
    mg.pos++;
    R();
  } else {
    mg.fails = (mg.fails||0)+1;
    // Animazione di scivolamento
    const fb = document.getElementById('mgfeedback');
    fb.innerHTML = `<div style="background:var(--parch);border:1.5px solid var(--ocraD);border-radius:8px;padding:12px;animation:fadeIn .3s">
      <strong style="color:var(--ocraD)">Attento!</strong> Ramo marcio o troppo distante. <em style="color:var(--inkL)">Rivaluta con calma il percorso.</em>
    </div>`;
    setTimeout(()=>{ fb.innerHTML=''; }, 2500);
  }
}

/* ─── KNAP: Scheggia la pietra ─── */
function mgKnap(stage){
  if(!G.mg.knap) G.mg.knap = {flakes:0, strikes:[], broken:false};
  const mg = G.mg.knap;
  const target = 3;

  stage.innerHTML = `
    <div id="knapArea" style="position:relative;height:280px;background:radial-gradient(circle at 50% 60%,#6B5840 0,#3B2A1A 100%);border-radius:8px;overflow:hidden;cursor:crosshair">
      <!-- Pietra nucleo -->
      <svg viewBox="0 0 400 240" style="position:absolute;inset:0;width:100%;height:100%" id="knapSvg">
        <defs>
          <radialGradient id="stoneGrad" cx=".4" cy=".4">
            <stop offset="0" stop-color="#A8937A"/>
            <stop offset="1" stop-color="#4A3A26"/>
          </radialGradient>
        </defs>
        <path id="stoneShape" d="M120 90 Q 100 70 120 50 Q 180 30 240 50 Q 290 70 285 130 Q 280 180 230 190 Q 150 200 110 170 Q 90 130 120 90 Z" fill="url(#stoneGrad)" stroke="#2A1A0A" stroke-width="1.5"/>
        ${mg.strikes.map((s,i)=>`<g><circle cx="${s.x}" cy="${s.y}" r="12" fill="none" stroke="#E8D8C0" stroke-width="2"/><path d="M${s.x-8} ${s.y-8}L${s.x+8} ${s.y+8}M${s.x+8} ${s.y-8}L${s.x-8} ${s.y+8}" stroke="#E8D8C0" stroke-width="1.5"/></g>`).join('')}
      </svg>
      <div style="position:absolute;bottom:8px;right:12px;color:#E8D8C0;font-family:var(--hf);font-size:14px;letter-spacing:1px">
        Schegge utili: ${mg.flakes}/${target}
      </div>
    </div>
    <div style="margin-top:10px;font-size:13px;color:var(--inkL);text-align:center">
      Clicca sul <strong>bordo della pietra</strong> per colpirla. Distanzia i colpi o la frantumi.
    </div>`;
  
  const area = document.getElementById('knapArea');
  area.onclick = (e)=>{
    if(mg.flakes>=target) return;
    const rect = area.getBoundingClientRect();
    const svgW = 400, svgH = 240;
    const x = (e.clientX-rect.left) / rect.width * svgW;
    const y = (e.clientY-rect.top) / rect.height * svgH;
    
    // Punto dentro la pietra (semplice hit test su ellisse circoscrivente)
    const cx=200, cy=120, rx=90, ry=75;
    const dx=(x-cx)/rx, dy=(y-cy)/ry;
    const inside = dx*dx+dy*dy <= 1;
    const onEdge = inside && dx*dx+dy*dy > 0.55; // zona bordo
    
    if(!onEdge){
      const fb = document.getElementById('mgfeedback');
      fb.innerHTML = `<div style="background:var(--parch);border:1.5px solid var(--ocraD);border-radius:8px;padding:12px;animation:fadeIn .3s"><strong style="color:var(--ocraD)">Colpo mancato.</strong> La pietra va colpita <em>sul bordo</em>, con angolazione: lì si staccano le schegge.</div>`;
      setTimeout(()=>fb.innerHTML='',2500);
      return;
    }
    
    // Troppo vicino a un colpo precedente?
    const tooClose = mg.strikes.some(s => Math.hypot(s.x-x, s.y-y) < 30);
    
    if(tooClose){
      const fb = document.getElementById('mgfeedback');
      fb.innerHTML = `<div style="background:var(--parch);border:1.5px solid var(--ocraD);border-radius:8px;padding:12px;animation:fadeIn .3s"><strong style="color:var(--ocraD)">Colpo troppo vicino al precedente!</strong> La pietra si spezza male. <em>Distanzia i colpi lungo il bordo.</em></div>`;
      setTimeout(()=>fb.innerHTML='',2800);
      return;
    }
    
    mg.strikes.push({x,y});
    mg.flakes++;
    R();
    
    if(mg.flakes>=target){
      setTimeout(()=>completeAgisci(), 600);
    }
  };
}

/* ─── FIRE: ordina i 4 passi ─── */
function mgFire(stage){
  const correctSeq = [
    {k:'wood', label:'Raccogli legna secca', desc:'Rametti piccoli prima, legna grossa dopo.'},
    {k:'circle', label:'Disponi le pietre a cerchio', desc:'Contengono il fuoco e lo proteggono dal vento.'},
    {k:'strike', label:'Sfrega/batti le pietre focaie', desc:'Le scintille cadono sul muschio secco.'},
    {k:'blow', label:'Soffia piano sulla scintilla', desc:'L\'ossigeno nutre la fiamma.'}
  ];
  
  if(!G.mg.fire) G.mg.fire = {order:[], done:false};
  const mg = G.mg.fire;
  
  // Pool = passi non ancora messi in ordine
  const pool = correctSeq.filter(s => !mg.order.includes(s.k));
  
  stage.innerHTML = `
    <div id="fireWrap">
      <div style="display:grid;gap:8px;margin-bottom:16px">
        ${[0,1,2,3].map(i=>{
          const placed = mg.order[i];
          const step = placed ? correctSeq.find(s=>s.k===placed) : null;
          const isCorrect = mg.done && step && correctSeq[i].k===placed;
          const isWrong = mg.done && step && correctSeq[i].k!==placed;
          return `<div class="tl-slot ${isCorrect?'correct':''} ${isWrong?'wrong':''}" data-slot="${i}" onclick="fireUnplace(${i})" style="padding:14px">
            <span class="tl-period">Passo ${i+1}</span>
            ${step?`<div style="display:flex;align-items:center;gap:10px;width:100%">
              ${iconForFireStep(step.k,22)}
              <div style="flex:1"><strong>${step.label}</strong>${mg.done?`<div style="font-size:12px;color:var(--inkL);margin-top:2px">${step.desc}</div>`:''}</div>
              ${!mg.done?`<span style="color:var(--inkLL);font-size:11px">tocca per tornare indietro</span>`:''}
            </div>`:`<span style="color:var(--inkLL);font-size:13px">Tocca un passo qui sotto</span>`}
          </div>`;
        }).join('')}
      </div>
      ${pool.length?`<div style="background:var(--cream);border-radius:8px;padding:12px;border:1px dashed var(--parchDD)">
        <div class="hf" style="font-size:11px;letter-spacing:1.5px;color:var(--inkLL);margin-bottom:8px">PASSI DA ORDINARE</div>
        ${pool.map(s=>`<div onclick="firePlace('${s.k}')" style="background:var(--parch);border:1.5px solid var(--parchDD);border-radius:6px;padding:10px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s" onmouseover="this.style.borderColor='var(--ocra)'" onmouseout="this.style.borderColor='var(--parchDD)'">
          ${iconForFireStep(s.k,22)}
          <strong>${s.label}</strong>
        </div>`).join('')}
      </div>`:''}
      ${mg.order.length===4 && !mg.done?`<div class="text-center mt-16"><button class="btn solid" onclick="fireCheck()">Accendi</button></div>`:''}
    </div>`;
}

function iconForFireStep(k,s){
  const map = {wood:SVG.tree, circle:SVG.stone, strike:SVG.spark, blow:SVG.fire};
  const col = {wood:'#5A4020', circle:'#6B5842', strike:'#C4A65A', blow:'#B8722E'};
  return (map[k]||SVG.star)(s, col[k]||'var(--ocra)');
}

function firePlace(k){
  G.mg.fire.order.push(k);
  R();
}
function fireUnplace(i){
  if(G.mg.fire.done) return;
  G.mg.fire.order.splice(i,1);
  R();
}
function fireCheck(){
  const correct = ['wood','circle','strike','blow'];
  const mg = G.mg.fire;
  const ok = mg.order.every((k,i)=>k===correct[i]);
  mg.done = true;
  R();
  
  const fb = document.getElementById('mgfeedback');
  if(ok){
    fb.innerHTML = `<div style="background:var(--moss);color:#fff;border-radius:8px;padding:14px;animation:fadeIn .4s">
      <strong>Fuoco acceso!</strong> Hai seguito la sequenza corretta. Ogni passo prepara il successivo.
    </div>`;
    setTimeout(()=>completeAgisci(), 1200);
  } else {
    fb.innerHTML = `<div style="background:var(--parch);border:1.5px solid var(--ocraD);border-radius:8px;padding:14px;animation:fadeIn .3s">
      <strong style="color:var(--ocraD)">L\'ordine non è quello giusto.</strong> Guarda i passi evidenziati in rosso: riconsiderali e riprova.
      <div class="text-center mt-16"><button class="btn sm" onclick="resetFire()">Riprova</button></div>
    </div>`;
  }
}
function resetFire(){
  G.mg.fire = {order:[], done:false};
  document.getElementById('mgfeedback').innerHTML='';
  R();
}

/* ─── SEW: collega i puntini in ordine ─── */
function mgSew(stage){
  const dots = [
    {x:120,y:60},{x:170,y:50},{x:220,y:55},{x:260,y:80},{x:280,y:120},
    {x:275,y:160},{x:250,y:195},{x:210,y:210},{x:160,y:210},{x:115,y:195},
    {x:85,y:165},{x:80,y:125},{x:95,y:85},{x:120,y:60}
  ];
  if(!G.mg.sew) G.mg.sew = {next:1};
  const mg = G.mg.sew;
  
  const lines = [];
  for(let i=0;i<mg.next-1;i++){
    lines.push(`<line x1="${dots[i].x}" y1="${dots[i].y}" x2="${dots[i+1].x}" y2="${dots[i+1].y}" stroke="#8B6914" stroke-width="2.5" stroke-dasharray="4 3"/>`);

  stage.innerHTML = `

        ${lines.join('')}
        ${dots.map((d,i)=>{
          if(i===dots.length-1 && mg.next<dots.length) return '';
          const visited = i < mg.next-1 || (i===0 && mg.next>0);
          const isNext = i===mg.next;
          return `<g onclick="sewDot(${i})" style="cursor:pointer">
            <circle cx="${d.x}" cy="${d.y}" r="${isNext?11:8}" fill="${visited?'#6B8142':isNext?'#B8722E':'#F0E6D0'}" stroke="#3B2A15" stroke-width="1.5"/>
            <text x="${d.x}" y="${d.y+4}" text-anchor="middle" font-family="Cormorant Garamond" font-size="10" fill="${visited?'#fff':'#3B2A15'}" font-weight="700">${i+1}</text>
            ${isNext?`<circle cx="${d.x}" cy="${d.y}" r="14" fill="none" stroke="#B8722E" stroke-width="1.5" opacity=".5"><animate attributeName="r" values="11;18;11" dur="1.5s" repeatCount="indefinite"/></circle>`:''}
          </g>`;
        }).join('')}
      </svg>
    </div>
    <div style="margin-top:10px;font-size:13px;color:var(--inkL);text-align:center">
      Prossimo punto: <strong>${mg.next+1}</strong> ${mg.next>=dots.length-1?'· Completato!':''}
    </div>`;
  
  if(mg.next>=dots.length-1){
    setTimeout(()=>completeAgisci(), 800);
  }
}

function sewDot(i){

/* ─── PAINT: pittura rupestre ─── */
function mgPaint(stage){
  stage.innerHTML = `
    <div class="paint-wrap">
      <canvas id="paintCanvas" width="600" height="360"></canvas>
    </div>
    <div class="paint-toolbar">
      <div class="paint-swatch active" data-color="#B8722E" style="background:#B8722E"></div>
      <div class="paint-swatch" data-color="#3B2A15" style="background:#3B2A15"></div>
      <div class="paint-swatch" data-color="#8B4513" style="background:#8B4513"></div>
      <div class="paint-swatch" data-color="#E8D0A0" style="background:#E8D0A0"></div>
      <button class="btn sm ghost" onclick="paintClear()" style="margin-left:auto">Cancella</button>
      <button class="btn sm solid" onclick="paintDone()">Ho finito</button>
    </div>
    <p class="small-note mt-16 text-center">${G.level==='secondaria'?'Non serve realismo: il Sapiens di 30.000 anni fa rappresentava l\'essenza, non la copia fedele.':'Disegna come vuoi. Un animale, una scena di caccia, una stella... come i Sapiens di 30.000 anni fa.'}</p>`;
  
  const canvas = document.getElementById('paintCanvas');
  const ctx = canvas.getContext('2d');
  
  // Sfondo caverna
  const grd = ctx.createRadialGradient(300,180,50,300,180,400);
  grd.addColorStop(0,'#5A4030');
  grd.addColorStop(1,'#2A1810');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // Texture roccia: punti random
  for(let i=0;i<300;i++){
    ctx.fillStyle = `rgba(${120+Math.random()*40},${90+Math.random()*30},${60+Math.random()*30},${0.15+Math.random()*0.25})`;
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*4, 0, Math.PI*2);
    ctx.fill();
  }
  
  // Se c'è una pittura salvata, ripristinala
  if(G.painting){
    const img = new Image();
    img.onload = ()=>ctx.drawImage(img,0,0,canvas.width,canvas.height);
    img.src = G.painting;
  }
  
  let drawing = false, color = '#B8722E', last=null;
  
  function getPos(e){
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width/r.width, sy = canvas.height/r.height;
    const x = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
    const y = (e.touches?e.touches[0].clientY:e.clientY) - r.top;
    return {x:x*sx, y:y*sy};
  }
  function start(e){ e.preventDefault(); drawing = true; last = getPos(e); }
  function move(e){
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.strokeStyle = color;
    ctx.lineWidth = 5;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(last.x,last.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
    last = p;
  }
  function end(){ drawing = false; }
  
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start);
  canvas.addEventListener('touchmove',move);
  canvas.addEventListener('touchend',end);
  
  // Swatches
  document.querySelectorAll('.paint-swatch').forEach(sw=>{
    sw.onclick = ()=>{
      document.querySelectorAll('.paint-swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      color = sw.dataset.color;
    };
  });
  
  // Memorizza il ctx per i controlli esterni
  window._paintCtx = ctx;
  window._paintCanvas = canvas;
}

function paintClear(){
  if(!window._paintCtx) return;
  const c = window._paintCanvas, ctx = window._paintCtx;
  ctx.clearRect(0,0,c.width,c.height);
  const grd = ctx.createRadialGradient(300,180,50,300,180,400);
  grd.addColorStop(0,'#5A4030');
  grd.addColorStop(1,'#2A1810');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,c.width,c.height);
  for(let i=0;i<300;i++){
    ctx.fillStyle = `rgba(${120+Math.random()*40},${90+Math.random()*30},${60+Math.random()*30},${0.15+Math.random()*0.25})`;
    ctx.beginPath();
    ctx.arc(Math.random()*c.width, Math.random()*c.height, Math.random()*4, 0, Math.PI*2);
    ctx.fill();
  }
}

function paintDone(){
  if(window._paintCanvas){
    G.painting = window._paintCanvas.toDataURL('image/png');
  }
  completeAgisci();
}

/* ═══════════════════════════════════════════════════════════════
   TIMELINE — ordina le specie
   ═══════════════════════════════════════════════════════════════ */
function rTimeline(){
  const correctOrder = ['australo','habilis','erectus','neander','sapiens'];
  const periods = ['4 mln','2,5 mln','1,8 mln','400.000','300.000 → oggi'];
  
  if(!G.mg.timeline) G.mg.timeline = {slots:[null,null,null,null,null], pool:['sapiens','neander','australo','erectus','habilis'], done:false, correct:0};
  const mg = G.mg.timeline;
  
  app.innerHTML = `
    ${topbar()}
    ${toolbar()}
    <div class="card deep">
      <p class="eyebrow text-center">Sintesi · 1 di 2</p>
      <h2 class="mid text-center">La linea del tempo</h2>
      <p class="small-note text-center mt-16">${txt(
        'Trascina ogni specie al suo posto, dalla più antica alla più recente.',
        'Colloca ogni ominide sulla linea temporale, dal più antico al più recente.'
      )}</p>
      
      <div style="margin-top:24px;display:grid;gap:10px">
        ${mg.slots.map((s,i)=>{
          const sp = s ? SPECIES.find(x=>x.id===s) : null;
          const isCorrect = mg.done && s===correctOrder[i];
          const isWrong = mg.done && s!==correctOrder[i];
          return `<div class="tl-slot ${isCorrect?'correct':''} ${isWrong?'wrong':''}" 
            data-slot="${i}" 
            ondragover="tlDragOver(event,${i})" 
            ondrop="tlDrop(event,${i})"
            ondragleave="event.currentTarget.classList.remove('over')">
            <span class="tl-period">${periods[i]}</span>
            ${sp?`<div style="display:flex;align-items:center;gap:10px;width:100%" ${!mg.done?`onclick="tlUnplace(${i})"`:''} style="cursor:${mg.done?'default':'pointer'}">
              ${sp.icon(32, sp.color)}
              <div><strong style="color:${sp.color}">${sp.name}</strong><div style="font-size:12px;color:var(--inkL)">${sp.where}</div></div>
            </div>`:`<span style="color:var(--inkLL);font-size:13px">Trascina o tocca una specie</span>`}
          </div>`;
        }).join('')}
      </div>
      
      ${mg.pool.length?`<div class="tl-pool">
        ${mg.pool.map(id=>{
          const sp = SPECIES.find(x=>x.id===id);
          return `<div class="tl-card" draggable="true" 
            ondragstart="tlDragStart(event,'${id}')" 
            ondragend="event.target.classList.remove('dragging')"
            onclick="tlClickPlace('${id}')">
            ${sp.icon(28, sp.color)}
            <div><strong style="color:${sp.color};font-size:14px">${sp.name}</strong><div style="font-size:11px;color:var(--inkL)">${sp.period}</div></div>
          </div>`;
        }).join('')}
      </div>`:''}
      
      ${mg.slots.every(s=>s!==null) && !mg.done?`<div class="text-center mt-20"><button class="btn solid" onclick="tlCheck()">Verifica</button></div>`:''}
      
      ${mg.done?`<div style="background:${mg.correct===5?'var(--moss)':'var(--parch)'};color:${mg.correct===5?'#fff':'var(--ink)'};border:${mg.correct<5?'1.5px solid var(--ocraD)':'none'};border-radius:8px;padding:14px;margin-top:16px;animation:fadeIn .4s">
        ${mg.correct===5?
          `<strong>Linea del tempo corretta!</strong> Hai ordinato tutti i nostri antenati.` :
          `<strong style="color:var(--ocraD)">${mg.correct}/5 corretti.</strong> Guarda le caselle rosse: quelle specie vanno al posto giusto. Tocca la casella per rimuoverla e riprova.`
        }
      </div>
      <div class="text-center mt-16">
        ${mg.correct===5?
          `<button class="btn solid" onclick="G.timelineDone=true;G.phase='matching';R()">Prossima sfida</button>`:
          `<button class="btn" onclick="tlReset()">Riprova</button>`
        }
      </div>`:''}
    </div>`;
}

function tlDragStart(ev, id){
  ev.dataTransfer.setData('text/plain', id);
  ev.target.classList.add('dragging');
}
function tlDragOver(ev, i){
  ev.preventDefault();
  if(!G.mg.timeline.slots[i]) ev.currentTarget.classList.add('over');
}
function tlDrop(ev, i){
  ev.preventDefault();
  ev.currentTarget.classList.remove('over');
  if(G.mg.timeline.slots[i]) return;
  const id = ev.dataTransfer.getData('text/plain');
  placeInSlot(id, i);
}
function tlClickPlace(id){
  // Mette nel primo slot libero
  const mg = G.mg.timeline;
  for(let i=0;i<mg.slots.length;i++){
    if(!mg.slots[i]){
      placeInSlot(id, i);
      return;
    }
  }
}
function placeInSlot(id, i){
  const mg = G.mg.timeline;
  mg.slots[i] = id;
  const pIdx = mg.pool.indexOf(id);
  if(pIdx>-1) mg.pool.splice(pIdx,1);
  R();
}
function tlUnplace(i){
  const mg = G.mg.timeline;
  if(mg.done) return;
  const id = mg.slots[i];
  if(!id) return;
  mg.slots[i] = null;
  mg.pool.push(id);
  R();
}
function tlCheck(){
  const correct = ['australo','habilis','erectus','neander','sapiens'];
  const mg = G.mg.timeline;
  mg.correct = mg.slots.reduce((acc,s,i)=>acc+(s===correct[i]?1:0),0);
  mg.done = true;
  R();
}
function tlReset(){
  const mg = G.mg.timeline;
  const placed = mg.slots.filter(s=>s!==null);
  mg.pool = [...mg.pool, ...placed];
  mg.slots = [null,null,null,null,null];
  mg.done = false;
  mg.correct = 0;
  R();
}

    ${topbar()}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px">
        <div>
          <div class="hf" style="font-size:11px;letter-spacing:2px;color:var(--inkLL);margin-bottom:10px">STRUMENTI</div>
          ${mg.toolsOrder.map(tk=>{
            const matched = mg.matches[tk];
            const sel = mg.selTool===tk;
            const correct = mg.done && correctMap[tk]===matched;
            const wrong = mg.done && matched && correctMap[tk]!==matched;
            return `<div class="match-card ${sel?'selected':''} ${matched?'matched':''}" 
                      style="${correct?'border-color:var(--moss);background:#6B814215':''}${wrong?'border-color:var(--ocraD);background:#B8722E15':''}"
                      onclick="matchPickTool('${tk}')">
              ${SVG[tk](24,'var(--ocra)')}
              <strong>${toolNames[tk]}</strong>
            </div>`;
          }).join('')}
        </div>
        <div>
          <div class="hf" style="font-size:11px;letter-spacing:2px;color:var(--inkLL);margin-bottom:10px">SPECIE</div>
          ${mg.speciesOrder.map(sid=>{
            const sp = SPECIES.find(x=>x.id===sid);
            const matchedTool = Object.keys(mg.matches).find(k=>mg.matches[k]===sid);
            const sel = mg.selSpecies===sid;
            return `<div class="match-card ${sel?'selected':''} ${matchedTool?'matched':''}"
                      onclick="matchPickSpecies('${sid}')">
              ${sp.icon(24, sp.color)}
              <div>
                <strong style="color:${sp.color}">${sp.name}</strong>
                ${matchedTool?`<div style="font-size:11px;color:var(--inkL);margin-top:2px">← ${toolNames[matchedTool]}</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
      
      ${Object.keys(mg.matches).length===5 && !mg.done?`<div class="text-center mt-20"><button class="btn solid" onclick="matchCheck()">Verifica</button></div>`:''}
      
      ${mg.done?`<div style="background:${mg.correct===5?'var(--moss)':'var(--parch)'};color:${mg.correct===5?'#fff':'var(--ink)'};border:${mg.correct<5?'1.5px solid var(--ocraD)':'none'};border-radius:8px;padding:14px;margin-top:20px">
        ${mg.correct===5?
          `<strong>Tutti abbinati correttamente!</strong> Conosci gli strumenti dei nostri antenati.`:
          `<strong style="color:var(--ocraD)">${mg.correct}/5 abbinamenti corretti.</strong> Guarda quelli in rosso: non appartengono a quella specie.`
        }
      </div>
      <div class="text-center mt-16">
        ${mg.correct===5?
          `<button class="btn solid" onclick="G.matchingDone=true;G.phase='export';R()">Vedi il tuo diario</button>`:
          `<button class="btn" onclick="matchReset()">Riprova</button>`
        }
      </div>`:''}
    </div>`;
}

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function matchPickTool(tk){
  const mg = G.mg.match;
  if(mg.done || mg.matches[tk]) return;
  mg.selTool = tk;
  if(mg.selSpecies){
    mg.matches[tk] = mg.selSpecies;
    mg.selTool = null;
    mg.selSpecies = null;
  }
  R();
}
function matchPickSpecies(sid){
  const mg = G.mg.match;
  if(mg.done) return;
  // Se c'è già un abbinamento a questa specie, non si può
  const already = Object.values(mg.matches).includes(sid);
  if(already) return;
  mg.selSpecies = sid;
  if(mg.selTool){
    mg.matches[mg.selTool] = sid;
    mg.selTool = null;
    mg.selSpecies = null;
  }
  R();
}
function matchCheck(){
  const correct = {footprint:'australo', stone:'habilis', fire:'erectus', needle:'neander', mouth:'sapiens'};
  const mg = G.mg.match;
  mg.correct = Object.keys(mg.matches).reduce((acc,k)=>acc+(mg.matches[k]===correct[k]?1:0),0);
  mg.done = true;
  R();
}
function matchReset(){
  G.mg.match.matches = {};
  G.mg.match.done = false;
  G.mg.match.correct = 0;
  G.mg.match.selTool = null;
  G.mg.match.selSpecies = null;
  R();
}

          <p style="font-size:14px;color:var(--inkL);letter-spacing:1px">Esploratore</p>
          <p class="hf" style="font-size:28px;color:var(--ocraD);margin:4px 0">${G.name}</p>
          <p style="font-size:13px;color:var(--inkLL);margin-top:10px">${date} · ${G.level==='primaria'?'Scuola primaria':'Scuola secondaria'}</p>
        </div>
      </div>
    </div>
    
    ${SPECIES.map((sp,i)=>{
      const d = G.diary[i] || {q1:'',q2:'',q3:''};
      const hypIdx = G.hyp[i];
      const hypText = hypIdx!=null ? txt(sp.hypothesis.options[hypIdx].text, sp.hypothesis.options[hypIdx].textS) : '—';
      return `<div class="diary-page" style="page-break-after:always">
        <div style="display:flex;align-items:center;gap:14px;padding-bottom:14px;border-bottom:1.5px solid ${sp.color}">
          <div>${sp.icon(52, sp.color)}</div>
          <div>
            <div class="hf" style="font-size:11px;letter-spacing:2px;color:var(--inkLL)">PAGINA ${i+1}</div>
            <div class="hf" style="font-size:26px;color:${sp.color}">${sp.name}</div>
            <div style="font-size:13px;color:var(--inkL)">${sp.period}</div>
          </div>
        </div>
        
        <div style="margin-top:18px">
          <div class="hf" style="font-size:10px;letter-spacing:1.5px;color:var(--inkLL);margin-bottom:4px">LA MIA IPOTESI INIZIALE</div>
          <div style="font-style:italic;color:var(--inkL);padding:10px 12px;background:var(--cream);border-radius:6px">"${hypText}"</div>
        </div>
        
        <div style="margin-top:18px">
          <div class="hf" style="font-size:10px;letter-spacing:1.5px;color:var(--inkLL);margin-bottom:4px">STRUMENTO ACQUISITO</div>
          <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${sp.color}18;border-left:3px solid ${sp.color};border-radius:0 6px 6px 0">
            ${SVG[sp.tool.key](22, sp.color)}
            <strong style="color:${sp.color}">${sp.tool.name}</strong>
            <span style="font-size:13px;color:var(--inkL)">· ${sp.tool.desc}</span>
          </div>
        </div>
        
        <div style="margin-top:20px">
          <div class="diary-label">Prima pensavo che...</div>
          <div style="min-height:36px;padding:8px 0;border-bottom:1.5px dotted var(--inkLL);font-style:italic;color:var(--ink);font-size:15px;line-height:1.8">${d.q1||'<span style="color:var(--inkLL);opacity:.4">(non compilato)</span>'}</div>
          
          <div class="diary-label">Ora so che...</div>
          <div style="min-height:36px;padding:8px 0;border-bottom:1.5px dotted var(--inkLL);font-style:italic;color:var(--ink);font-size:15px;line-height:1.8">${d.q2||'<span style="color:var(--inkLL);opacity:.4">(non compilato)</span>'}</div>
          
          <div class="diary-label">Una cosa in più...</div>
          <div style="min-height:36px;padding:8px 0;border-bottom:1.5px dotted var(--inkLL);font-style:italic;color:var(--ink);font-size:15px;line-height:1.8">${d.q3||'<span style="color:var(--inkLL);opacity:.4">(non compilato)</span>'}</div>
        </div>
      </div>`;
    }).join('')}
    
    ${G.painting?`<div class="diary-page" style="page-break-after:always;text-align:center">
      <div class="hf" style="font-size:11px;letter-spacing:2px;color:var(--inkLL);margin-bottom:4px">IL MIO SEGNO RUPESTRE</div>
      <div class="hf" style="font-size:22px;color:var(--ocraD);margin-bottom:16px">Come un Sapiens di 30.000 anni fa</div>
      <img src="${G.painting}" style="max-width:100%;border:2px solid var(--parchDD);border-radius:8px">
      <p style="font-style:italic;color:var(--inkL);font-size:13px;margin-top:12px">${G.name}, ${date}</p>
    </div>`:''}
    
    <div class="diary-page">
      <div class="diary-title">Sintesi del viaggio</div>
      <div class="prose" style="margin-top:14px">
        <p><strong>Ho viaggiato</strong> attraverso <strong>5 specie</strong> di ominidi, da 4 milioni di anni fa a oggi.</p>
        <p>Ho raccolto <strong>${G.tools.length} strumenti</strong>: ${G.tools.map(t=>{const sp=SPECIES.find(s=>s.tool.key===t);return sp?sp.tool.name:'';}).filter(Boolean).join(', ')}.</p>
        <p>Ho formulato <strong>${Object.keys(G.hyp).length} ipotesi</strong> prima di scoprire le risposte.</p>
        <p>Ho scritto <strong>${Object.values(G.diary).reduce((a,d)=>a+['q1','q2','q3'].filter(k=>d[k]&&d[k].trim()).length,0)} riflessioni</strong> nel diario.</p>
      </div>
      <div style="margin-top:28px;padding-top:16px;border-top:1px solid var(--parchDD);text-align:center">
        <p style="font-style:italic;color:var(--inkL);max-width:440px;margin:0 auto;line-height:1.7">${txt(
          'Un giorno qualcuno leggerà di te come oggi tu leggi dell\'Australopiteco. Scrivi bene la tua storia.',
          'La linea che va da Lucy fino a te continua ogni giorno. La storia che racconterai dipende dalle scelte che fai.'
        )}</p>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   START
   ═══════════════════════════════════════════════════════════════ */
R();
</script>
</body>
</html>
